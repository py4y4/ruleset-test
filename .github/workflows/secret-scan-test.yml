name: Secret Scan Read Test
on:
  push:
    branches: [workflow-test]

permissions:
  security-events: read

jobs:
  read-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Read secret scanning alerts via GITHUB_TOKEN
        run: |
          echo "=== GITHUB_TOKEN attempt ==="
          curl -s -w "
HTTP_STATUS:%{http_code}"             -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/${{ github.repository }}/secret-scanning/alerts" | head -50
          echo "=== Token scopes ==="
          curl -s -I -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"             https://api.github.com/user | grep -i x-oauth
