name: scan-test
on:
  push:
    branches:
      - workflow-test-v2

permissions:
  security-events: read

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - name: test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/secret-scanning/alerts" > /tmp/out.json
          cat /tmp/out.json
          echo ""
          echo "HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/secret-scanning/alerts")"
          curl -s -I -H "Authorization: token $GH_TOKEN" "https://api.github.com/user" 2>&1 | grep -i x-oauth || true
